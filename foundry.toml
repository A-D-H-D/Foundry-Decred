[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

# Remappings for imports
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

# RPC endpoints
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC}"

# Etherscan for verification
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
